<!doctype html>
<html lang="ja">
  <head>
    <title>maplibre-gl-terradraw デモ</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" />
    <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@watergis/maplibre-gl-terradraw@latest/dist/maplibre-gl-terradraw.umd.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@watergis/maplibre-gl-terradraw@latest/dist/maplibre-gl-terradraw.css" />

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        height: 100%;
        font-family: 'Segoe UI', sans-serif;
      }

      #map {
        width: 100%;
        height: 100%;
      }

      /* モード選択パネル（地図右上に重ねて表示） */
      #mode-panel {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 8px;
        padding: 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.25);
        width: 180px;
        z-index: 10;
      }

      #mode-panel h3 {
        font-size: 12px;
        color: #555;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      #mode-panel select {
        width: 100%;
        padding: 6px 8px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 13px;
        cursor: pointer;
        background: white;
      }

      #current-mode {
        margin-top: 8px;
        font-size: 12px;
        color: #888;
      }

      #current-mode span {
        font-weight: bold;
        color: #333;
      }
    </style>
  </head>
  <body>

    <div id="map"></div>

    <!-- モード選択UI -->
    <div id="mode-panel">
      <h3>描画モード</h3>
      <select id="mode-select" onchange="changeMode(this.value)">
        <option value="render">-- 選択してください --</option>
        <option value="point">点（Point）</option>
        <option value="linestring">線（LineString）</option>
        <option value="polygon">ポリゴン（Polygon）</option>
        <option value="rectangle">矩形（Rectangle）</option>
        <option value="angled-rectangle">傾き矩形</option>
        <option value="circle">円（Circle）</option>
        <option value="freehand">フリーハンド（面）</option>
        <option value="freehand-linestring">フリーハンド（線）</option>
        <option value="select">選択・編集</option>
      </select>
      <div id="current-mode">現在: <span>なし</span></div>
    </div>

    <script>
      const map = new maplibregl.Map({
        container: 'map',
        style: 'https://demotiles.maplibre.org/style.json',
        center: [139.7, 35.68],
        zoom: 9
      });

      const drawControl = new MaplibreTerradrawControl.MaplibreTerradrawControl({
        modes: [
          'point',
          'linestring',
          'polygon',
          'rectangle',
          'angled-rectangle',
          'circle',
          'freehand',
          'freehand-linestring',
          'select',
          'delete-selection',
          'delete',
          'undo',
          'redo',
          'download'
        ],
        open: true
      });
      map.addControl(drawControl, 'top-left');

      // モード切り替え
      function changeMode(mode) {
        const td = drawControl.getTerraDrawInstance();
        if (!td) return;
        td.setMode(mode === 'render' ? 'render' : mode);
        document.querySelector('#current-mode span').textContent =
          mode === 'render' ? 'なし' : document.querySelector(`#mode-select option[value="${mode}"]`).textContent;
      }

      // プラグイン側のモード変更もセレクトに反映
      drawControl.on('mode-changed', (e) => {
        const sel = document.getElementById('mode-select');
        const opt = sel.querySelector(`option[value="${e.mode}"]`);
        sel.value = opt ? e.mode : 'render';
        document.querySelector('#current-mode span').textContent =
          opt ? opt.textContent : 'なし';
      });
    </script>
  </body>
</html>
